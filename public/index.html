<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ورود به سیراچت</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image" href="./assets/images/417a030f-abf5-4f82-8cfb-0949a572d74e.png">

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <form class="bg-white p-6 rounded shadow w-full max-w-md space-y-4" id="loginForm">
    <div style="display: flex; margin-bottom: 10px; border-radius: 5px; align-items: center; justify-content: center;"
      class="bg-blue-700">
      <img style="width: 50px; height: 50px; margin-left: 10px; border-radius: 25%; border: 2px dashed aqua;"
        src="./assets/images/417a030f-abf5-4f82-8cfb-0949a572d74e.png" alt="">
      <h1 class="magic-text text-2xl mb-2.5 text-center font-bold" style="display: flex; cursor: default;">ورود به
        سیراچت</h1>
    </div>
    <input type="text" name="username" placeholder="نام کاربری" required class="w-full p-2 border rounded" />
    <input type="password" name="password" placeholder="رمز عبور" required class="w-full p-2 border rounded" />
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">ورود</button>
    <a href="/register.html" class="text-blue-600 text-sm text-center block hover:underline">ثبت‌نام</a>
  </form>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      if (res.ok) {
        window.location.href = '/chat.html';
      } else {
        alert(await res.text());
      }
    });
  </script>

</body>

</html>
